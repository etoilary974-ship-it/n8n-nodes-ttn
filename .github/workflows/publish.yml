# Publishes this n8n community node package to npm on every version tag push.
#
# Authentication uses npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
# Starting May 1 2026, n8n requires community nodes to be published via
# GitHub Actions with npm provenance. Trusted Publishing provides both.
#
# ─── TRUSTED PUBLISHER (configured on npmjs.com) ─────────────────────────────
#
# Package settings → Trusted Publishers → GitHub Actions:
#   Repository owner: etoilary974-ship-it
#   Repository name:  TTN_Node
#   Workflow name:    publish.yml
#   Environment:      (leave blank)
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# @n8n/node-cli ≥ 0.23.0 — in CI, `npm run release` runs lint + build + publish.
# npm CLI ≥ 11.5.1 is required for Trusted Publishing (upgraded in this workflow).
#
# ─── TAG CONVENTION ────────────────────────────────────────────────────────────
#
# Triggers on tags matching "*.*.*" (e.g. 1.0.1).
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Locally:
#   npm run release
#
# This bumps the version, updates the changelog, commits, tags, and pushes.
# The tag push triggers this workflow, which publishes to npm via OIDC.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required for npm Trusted Publishing (OIDC token exchange).
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Release
        # In CI, n8n-node release runs lint, build, then `npm publish` with provenance.
        # Auth is handled automatically via GitHub OIDC (Trusted Publisher).
        run: npm run release

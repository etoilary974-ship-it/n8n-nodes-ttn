# Publishes this n8n community node package to npm on every version tag push.
#
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
# Trusted Publisher on npmjs.com must match exactly:
#   Owner: etoilary974-ship-it | Repo: n8n-nodes-ttn | Workflow: publish.yml
#
# Release locally: npm run release  (bumps version, tags, pushes)
# Tag push triggers this workflow.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Configure npm registry for OIDC publish
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@loewencreville'
          package-manager-cache: false

      - name: Prepare .npmrc for OIDC
        run: |
          # setup-node writes an empty _authToken line that blocks OIDC — remove it.
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC_PATH" ]; then
            sed -i '/_authToken/d' "$NPMRC_PATH"
          fi
          echo "node $(node --version), npm $(npm --version)"
          echo "repository: $(node -p "require('./package.json').repository.url")"
          echo ".npmrc ($NPMRC_PATH):"
          cat "$NPMRC_PATH" 2>/dev/null || echo "(none)"

      - name: Publish to npm
        run: npm publish --access public

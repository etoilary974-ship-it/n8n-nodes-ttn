# Publishes this n8n community node package to npm on every version tag push.
#
# Authentication: npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
# Do NOT set registry-url on setup-node: it writes an empty _authToken line
# that blocks OIDC. npm 11+ on Node 24 detects GitHub Actions automatically.
#
# Trusted Publisher on npmjs.com:
#   Owner: etoilary974-ship-it | Repo: n8n-nodes-ttn | Workflow: publish.yml
#
# Release locally: npm run release  (bumps version, tags, pushes — no npm publish)
# Tag push triggers this workflow.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
